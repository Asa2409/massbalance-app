<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MassBalance Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0b0b; color: #fff; font-family: 'Inter', sans-serif; }
        .card { background: #161616; border: 1px solid #222; border-radius: 20px; }
        .accent { color: #d4ff00; }
        .btn-main { background: #d4ff00; color: #000; font-weight: 900; }
        .hidden { display: none; }
        input { background: #000; border: 1px solid #333; padding: 12px; border-radius: 12px; width: 100%; outline: none; margin-top: 5px; }
        .tab-btn { flex: 1; padding: 10px; text-align: center; font-size: 10px; font-weight: bold; color: #666; }
        .tab-active { color: #d4ff00; border-bottom: 2px solid #d4ff00; }
    </style>
</head>
<body class="p-4 pb-20">

    <div id="onboarding" class="max-w-md mx-auto hidden">
        <h2 class="text-3xl font-black italic accent mb-6">PROFILNI SOZLASH</h2>
        <div class="card p-6 space-y-4">
            <div><label class="text-[10px] text-gray-500 uppercase font-bold">Ismingiz</label><input id="reg-name" type="text" placeholder="Asadbek"></div>
            <div><label class="text-[10px] text-gray-500 uppercase font-bold">Vazningiz (kg)</label><input id="reg-weight" type="number" placeholder="80"></div>
            <div><label class="text-[10px] text-gray-500 uppercase font-bold">Bo'yingiz (sm)</label><input id="reg-height" type="number" placeholder="180"></div>
            <div><label class="text-[10px] text-gray-500 uppercase font-bold">Maqsad</label>
                <select id="reg-goal" class="w-full bg-black border border-333 p-3 rounded-xl mt-1 outline-none text-white">
                    <option value="lose">Ozish (Sushka)</option>
                    <option value="gain">Semirish (Massa)</option>
                </select>
            </div>
            <button onclick="saveProfile()" class="w-full btn-main p-4 rounded-xl mt-4 uppercase italic">Planni Tuzish</button>
        </div>
    </div>

    <div id="main-app" class="max-w-md mx-auto hidden">
        <div class="flex justify-between items-center mb-6">
            <div>
                <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Salom, <span id="user-display-name" class="accent text-white">Atlet</span></p>
                <h1 class="text-xl font-black italic">MASS<span class="accent">BALANCE</span></h1>
            </div>
            <button onclick="resetData()" class="text-[8px] border border-gray-800 p-2 rounded-lg text-gray-600">RESET</button>
        </div>

        <div class="flex border-b border-gray-900 mb-6">
            <div id="t-dash" onclick="showTab('dash')" class="tab-btn tab-active uppercase">Dashboard</div>
            <div id="t-plan" onclick="showTab('plan')" class="tab-btn uppercase">Ratsion</div>
            <div id="t-calc" onclick="showTab('calc')" class="tab-btn uppercase">Kalkulyator</div>
        </div>

        <div id="tab-dash" class="space-y-6">
            <div class="card p-8 text-center border-t-4 border-[#d4ff00]">
                <p class="text-[10px] text-gray-500 font-bold uppercase mb-2">Kunlik Norma</p>
                <div class="text-5xl font-black mb-2 italic"><span id="target-kcal">0</span> <span class="text-sm font-bold text-gray-700">kcal</span></div>
                <p class="text-xs text-gray-400 italic" id="goal-text"></p>
            </div>
        </div>

        <div id="tab-plan" class="hidden space-y-4 text-sm">
            <h3 class="font-bold accent uppercase italic">Kunlik Ratsion Tavsiyasi:</h3>
            <div id="diet-content" class="space-y-2">
                </div>
        </div>

        <div id="tab-calc" class="hidden space-y-4">
            <div class="card p-5 space-y-4">
                <input id="food-name" type="text" placeholder="Mahsulot nomi (osh, tuxum...
                    )" class="input-style">
                <input id="food-weight" type="number" placeholder="Miqdori (gr)" class="input-style">
                <button onclick="calculateFood()" class="w-full btn-main p-4 rounded-xl uppercase italic">Hisoblash</button>
            </div>
            <div id="calc-result" class="card p-5 hidden animate-pulse border border-[#d4ff00]">
                <div class="flex justify-between items-center">
                    <span class="font-bold text-lg" id="res-kcal">0 kcal</span>
                    <span class="text-gray-500 text-xs italic" id="res-name"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        // BAZA
        const db = {
            "tuxum": { k: 155, p: 13 }, "osh": { k: 210, p: 6 }, "tovuq": { k: 165, p: 31 },
            "guruch": { k: 130, p: 2.7 }, "non": { k: 260, p: 8 }, "somsa": { k: 280, p: 10 }
        };

        // SAQLASH VA YUKLASH
        window.onload = function() {
            const savedData = localStorage.getItem('mb_user');
            if(savedData) {
                showApp(JSON.parse(savedData));
            } else {
                document.getElementById('onboarding').classList.remove('hidden');
            }
        };

        function saveProfile() {
            const name = document.getElementById('reg-name').value;
            const weight = document.getElementById('reg-weight').value;
            const goal = document.getElementById('reg-goal').value;
            if(!name || !weight) return tg.showAlert("Ma'lumotlarni to'ldiring!");

            const user = { name, weight, goal, kcal: goal === 'lose' ? weight * 25 : weight * 35 };
            localStorage.setItem('mb_user', JSON.stringify(user));
            showApp(user);
        }

        function showApp(user) {
            document.getElementById('onboarding').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('user-display-name').innerText = user.name;
            document.getElementById('target-kcal').innerText = Math.round(user.kcal);
            document.getElementById('goal-text').innerText = user.goal === 'lose' ? "Siz hozir SUSHKA rejimidasiz" : "Siz hozir MASSA rejimidasiz";
            
            // Ratsionni shakllantirish
            let diet = user.goal === 'lose' ? 
                ['Nonushta: 3ta qaynatilgan tuxum', 'Tushlik: 150g tovuq + bodring', 'Kechki: 200g tvorog'] :
                ['Nonushta: Suli bo‘tqasi + 2ta tuxum', 'Tushlik: 200g go‘sht + guruch', 'Kechki: 150g baliq + kartoshka'];
            
            document.getElementById('diet-content').innerHTML = diet.map(i => `<div class="card p-3">${i}</div>`).join('');
        }

        function showTab(tab) {
            ['dash', 'plan', 'calc'].forEach(t => {
                document.getElementById('tab-' + t).classList.add('hidden');
                document.getElementById('t-' + t).classList.remove('tab-active');
            });
            document.getElementById('tab-' + tab).classList.remove('hidden');
            document.getElementById('t-' + tab).classList.add('tab-active');
            tg.HapticFeedback.impactOccurred('light');
        }

        function calculateFood() {
            let name = document.getElementById('food-name').value.toLowerCase().trim();
            let weight = parseFloat(document.getElementById('food-weight').value);
            let resDiv = document.getElementById('calc-result');

            for (let key in db) {
                if (name.includes(key)) {
                    let kkal = Math.round(db[key].k * (weight / 100));
                    document.getElementById('res-kcal').innerText = kkal + " kcal";
                    document.getElementById('res-name').innerText = name.toUpperCase();
                    resDiv.classList.remove('hidden');
                    tg.HapticFeedback.notificationOccurred('success');
                    return;
                }
            }
            tg.showAlert("Bazada topilmadi!");
        }

        function resetData() {
            localStorage.removeItem('mb_user');
            location.reload();
        }
    </script>
</body>
</html>
