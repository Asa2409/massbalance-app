<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MassBalance Pro Fix Final</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #080808; color: #fff; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: #111; border: 1px solid #222; border-radius: 20px; }
        .accent { color: #d4ff00; }
        input, select { background: #1a1a1a; border: 1px solid #333; padding: 16px; border-radius: 12px; width: 100%; color: #fff; outline: none; font-size: 16px; margin-bottom: 10px; }
        .btn-next { background: #d4ff00; color: #000; width: 100%; padding: 18px; border-radius: 15px; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4">

    <div id="setup-container">
        <h1 class="text-2xl font-black accent italic text-center mb-6 mt-4">PROFIL SOZLASH</h1>
        
        <div class="glass p-6">
            <div id="div-step1">
                <label class="text-[10px] text-gray-500 font-bold uppercase mb-2 block">1-QADAM: Ism va Yosh</label>
                <input id="in-name" type="text" placeholder="Ismingiz">
                <input id="in-age" type="number" placeholder="Yoshingiz">
                <button onclick="moveStep(2)" class="btn-next">Keyingisi</button>
            </div>

            <div id="div-step2" class="hidden">
                <label class="text-[10px] text-gray-500 font-bold uppercase mb-2 block">2-QADAM: Vazn va Bo'y</label>
                <input id="in-weight" type="number" placeholder="Vazn (kg)">
                <input id="in-height" type="number" placeholder="Bo'y (sm)">
                <div class="flex gap-2">
                    <button onclick="moveStep(1)" class="w-1/4 p-4 glass text-gray-400">⬅️</button>
                    <button onclick="moveStep(3)" class="btn-next">Keyingisi</button>
                </div>
            </div>

            <div id="div-step3" class="hidden">
                <label class="text-[10px] text-gray-500 font-bold uppercase mb-2 block">3-QADAM: Faollik</label>
                <select id="in-act">
                    <option value="1.2">0 marta (kam harakat)</option>
                    <option value="1.375">1-3 marta (o'rtacha)</option>
                    <option value="1.55">4-6 marta (faol)</option>
                </select>
                <div class="flex gap-2">
                    <button onclick="moveStep(2)" class="w-1/4 p-4 glass text-gray-400">⬅️</button>
                    <button onclick="completeSetup()" class="btn-next">Tayyor</button>
                </div>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden text-center">
        <h2 id="out-name" class="text-xl font-bold accent italic uppercase"></h2>
        <div class="glass p-8 mt-6">
            <p class="text-xs text-gray-500 uppercase font-bold">Kunlik Normangiz</p>
            <h1 id="out-kcal" class="text-6xl font-black accent">0</h1>
            <p class="text-xs mt-4">Kcal / kun</p>
        </div>
        <button onclick="resetApp()" class="mt-10 text-red-500 text-xs font-bold uppercase opacity-50">Ma'lumotlarni o'chirish</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function moveStep(step) {
            console.log("Navigating to step: " + step);
            // Hamma step divlarini yashirish
            document.getElementById('div-step1').classList.add('hidden');
            document.getElementById('div-step2').classList.add('hidden');
            document.getElementById('div-step3').classList.add('hidden');
            
            // Kerakli stepni ko'rsatish
            document.getElementById('div-step' + step).classList.remove('hidden');
            
            // Haptic aloqa
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        function completeSetup() {
            const n = document.getElementById('in-name').value;
            const w = document.getElementById('in-weight').value;
            const a = document.getElementById('in-age').value;
            const h = document.getElementById('in-height').value;
            const act = document.getElementById('in-act').value;

            if(!n  !w  !a || !h) {
                alert("Iltimos, barcha kataklarni to'ldiring!");
                return;
            }

            // Mifflin-St Jeor formula
            let bmr = (10 * parseFloat(w)) + (6.25 * parseFloat(h)) - (5 * parseFloat(a)) + 5;
            let total = Math.round(bmr * parseFloat(act));

            const data = { name: n, kcal: total };
            localStorage.setItem('mb_user_v73', JSON.stringify(data));
            showApp(data);
        }

        function showApp(data) {
            document.getElementById('setup-container').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('out-name').innerText = data.name;
            document.getElementById('out-kcal').innerText = data.kcal;
        }

        function resetApp() {
            localStorage.removeItem('mb_user_v73');
            location.reload();
        }

        window.onload = () => {
            const saved = localStorage.getItem('mb_user_v73');
            if(saved) showApp(JSON.parse(saved));
        };
    </script>
</body>
</html>
