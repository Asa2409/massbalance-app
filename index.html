<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MassBalance Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0b0b; color: #fff; font-family: 'Inter', sans-serif; }
        .card { background: #161616; border: 1px solid #222; border-radius: 20px; }
        .accent { color: #d4ff00; }
        .btn-main { background: #d4ff00; color: #000; font-weight: 900; }
        .input-style { background: #000; border: 1px solid #333; padding: 12px; border-radius: 12px; width: 100%; outline: none; }
        .tab-active { color: #d4ff00; border-bottom: 2px solid #d4ff00; }
        .unit-btn { background: #222; padding: 8px; border-radius: 10px; flex: 1; text-align: center; font-size: 10px; cursor: pointer; border: 1px solid transparent; }
        .unit-active { border-color: #d4ff00; color: #d4ff00; }
    </style>
</head>
<body class="p-4 pb-24">

    <div id="onboarding" class="max-w-md mx-auto hidden">
        <h2 class="text-3xl font-black italic accent mb-6 tracking-tighter">PROFIL YARATISH</h2>
        <div class="card p-6 space-y-4">
            <input id="reg-name" type="text" placeholder="Ismingiz">
            <div class="flex gap-2">
                <input id="reg-weight" type="number" placeholder="Vazn (kg)">
                <input id="reg-height" type="number" placeholder="Bo'y (sm)">
            </div>
            <select id="reg-goal" class="input-style text-white">
                <option value="lose">Ozish (Sushka)</option>
                <option value="gain">Semirish (Massa)</option>
            </select>
            <button onclick="saveProfile()" class="w-full btn-main p-4 rounded-xl mt-4 uppercase italic">Boshlash</button>
        </div>
    </div>

    <div id="main-app" class="max-w-md mx-auto hidden">
        <div class="card p-5 mb-6 border-l-4 border-[#d4ff00]">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h1 id="user-display-name" class="text-xl font-black accent tracking-tight">ATLET</h1>
                    <p id="goal-display" class="text-[9px] text-gray-500 font-bold uppercase tracking-widest"></p>
                </div>
                <button onclick="resetData()" class="text-[10px] text-red-500 font-bold">RESET</button>
            </div>
            <div class="grid grid-cols-3 gap-4 text-center">
                <div><p class="text-[10px] text-gray-500 uppercase">Bo'y</p><p id="d-height" class="font-bold">0 sm</p></div>
                <div><p class="text-[10px] text-gray-500 uppercase">Vazn</p><p id="d-weight" class="font-bold">0 kg</p></div>
                <div><p class="text-[10px] text-gray-500 uppercase">Kkal</p><p id="target-kcal" class="accent font-black">0</p></div>
            </div>
        </div>

        <div class="flex border-b border-gray-900 mb-6">
            <div id="t-plan" onclick="showTab('plan')" class="flex-1 py-3 text-center text-xs font-bold cursor-pointer">RATSION</div>
            <div id="t-calc" onclick="showTab('calc')" class="flex-1 py-3 text-center text-xs font-bold cursor-pointer">KALKULYATOR</div>
        </div>

        <div id="tab-plan" class="hidden space-y-4">
            <h3 class="text-sm font-black accent italic uppercase mb-2">7 Kunlik Reja:</h3>
            <div id="weekly-plan" class="space-y-3">
                </div>
        </div>

        <div id="tab-calc" class="hidden space-y-4">
            <div class="card p-5 space-y-4">
                <input id="food-name" type="text" placeholder="Mahsulot nomi (osh, tuxum...)" class="input-style">
                <div class="flex gap-2">
                    <div id="u-gr" onclick="setUnit('gr')" class="unit-btn unit-active">GRAMM</div>
                    <div id="u-pc" onclick="setUnit('pc')" class="unit-btn">DONA/PORT</div>
                </div>
                <input id="food-amount" type="number" placeholder="Miqdori" class="input-style">
                <button onclick="calculateFood()" class="w-full btn-main p-4 rounded-xl uppercase italic">Hisoblash</button>
            </div>

            <div id="calc-res" class="card p-6 hidden border border-[#d4ff00]">
                <div class="text-3xl font-black mb-4"><span id="res-kcal">0</span> <span class="text-xs text-gray-500">KCAL</span></div>
                <div class="grid grid-cols-3 gap-2">
                    <div class="bg-black p-2 rounded-lg text-center"><p class="text-blue-400 font-bold" id="res-p">0g</p><p class="text-[8px] text-gray-600">OQSIL</p></div>
                    <div class="bg-black p-2 rounded-lg text-center"><p class="text-yellow-400 font-bold" id="res-f">0g</p><p class="text-[8px] text-gray-600">YOG'</p></div>
                    <div class="bg-black p-2 rounded-lg text-center"><p class="text-green-400 font-bold" id="res-c">0g</p><p class="text-[8px] text-gray-600">UGLEVOD</p></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let currentUnit = 'gr';
        
        const db = {
            "tuxum": { k: 155, p: 13, f: 11, c: 1.1, dw: 55 },
            "osh": { k: 210, p: 6, f: 12, c: 20, dw: 350 },
            "tovuq": { k: 165, p: 31, f: 3.6, c: 0, dw: 150 },
            "non": { k: 260, p: 8, f: 1, c: 50, dw: 30 }
        };

        const weeklyDiets = {
            lose: [
                {day: "Dushanba", menu: "N: 2ta tuxum. T: 150g tovuq. K: Tvorog."},
                {day: "Seshanba", menu: "N: Suli bo'tqasi. T: Baliq + Salat. K: Qatiq."},
                {day: "Chorshanba", menu: "N: Mevalar. T: Sho'rva. K: Qaynatilgan go'sht."},
                {day: "Payshanba", menu: "N: Omlet. T: Tovuq file. K: Sabzavotlar."},
                {day: "Juma", menu: "N: Tvorog. T: Grechka + Go'sht. K: Bodringli salat."},
                {day: "Shanba", menu: "N: 1ta tuxum. T: Dimlama. K: Meva."},
                {day: "Yakshanba", menu: "N: Choy + Pishloq. T: Sho'rva. K: Yengil salat."}
            ],
            gain: [
                {day: "Dushanba", menu: "N: 3ta tuxum + Non. T: 1 portsiy osh. K: Go'sht + Guruch."},
                {day: "Seshanba", menu: "N: Suli + Asal. T: Pasta + Tovuq. K: 2ta banan + Tvorog."},
                {day: "Chorshanba", menu: "N: Somsa 2ta. T: Qozon kabob. K: Sut + Non."},
                {day: "Payshanba", menu: "N: Qovurilgan tuxum. T: Burger + Fri. K: Go'shtli ovqat."},
                {day: "Juma", menu: "N: Pishloqli sendvich. T: Manti. K: Palov."},
                {day: "Shanba", menu: "N: Bo'tqa + Yong'oq. T: Shashlik. K: Sutli mahsulotlar."},
                {day: "Yakshanba", menu: "N: 2ta somsa. T: Lag'mon. K: Tuxum + Guruch."}
            ]
        };

        window.onload = function() {
            const data = localStorage.getItem('mb_v4_data');
            if(data) showApp(JSON.parse(data));
            else document.getElementById('onboarding').classList.remove('hidden');
        };

        function saveProfile() {
            const n = document.getElementById('reg-name').value;
            const w = document.getElementById('reg-weight').value;
            const h = document.getElementById('reg-height').value;
            const g = document.getElementById('reg-goal').value;
            if(!n  !w  !h) return;

            const user = { name: n, weight: w, height: h, goal: g, kcal: g === 'lose' ? w * 24 : w * 35 };
            localStorage.setItem('mb_v4_data', JSON.stringify(user));
            showApp(user);
        }

        function showApp(user) {
            document.getElementById('onboarding').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('user-display-name').innerText = user.name.toUpperCase();
            document.getElementById('d-height').innerText = user.height + " sm";
            document.getElementById('d-weight').innerText = user.weight + " kg";
            document.getElementById('target-kcal').innerText = Math.round(user.kcal);
            document.getElementById('goal-display').innerText = user.goal === 'lose' ? "SUSHKA REJIMI" : "MASSA REJIMI";
            
            // Haftalik plan chiqarish
            const plan = weeklyDiets[user.goal];
            document.getElementById('weekly-plan').innerHTML = plan.map(d => `
                <div class="card p-4">
                    <p class="accent text-[10px] font-black uppercase">${d.day}</p>
                    <p class="text-xs text-gray-300 mt-1">${d.menu}</p>
                </div>
            `).join('');
            showTab('plan');
        }

        function showTab(t) {
            ['plan', 'calc'].forEach(tab => {
                document.getElementById('tab-' + tab).classList.add('hidden');
                document.getElementById('t-' + tab).classList.remove('tab-active');
            });
            document.getElementById('tab-' + t).classList.remove('hidden');
            document.getElementById('t-' + t).classList.add('tab-active');
        }

        function setUnit(u) {
            currentUnit = u;
            document.getElementById('u-gr').classList.toggle('unit-active', u === 'gr');
            document.getElementById('u-pc').classList.toggle('unit-active', u === 'pc');
        }

        function calculateFood() {
            const name = document.getElementById('food-name').value.toLowerCase();
            const amount = parseFloat(document.getElementById('food-amount').value);
            if(!name || !amount) return;

            for(let key in db) {
                if(name.includes(key)) {
                    let food = db[key];
                    let weight = currentUnit === 'pc' ? amount * food.dw : amount;
                    let r = weight / 100;

                    document.getElementById('res-kcal').innerText = Math.round(food.k * r);
                    document.getElementById('res-p').innerText = Math.round(food.p * r) + "g";
                    document.getElementById('res-f').innerText = Math.round(food.f * r) + "g";
                    document.getElementById('res-c').innerText = Math.round(food.c * r) + "g";
                    document.getElementById('calc-res').classList.remove('hidden');
                    return;
                }
            }
            tg.showAlert("Mahsulot topilmadi!");
        }

        function resetData() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
