<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MassBalance Pro AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0b0b; color: #fff; font-family: 'Inter', sans-serif; }
        .step { display: none; }
        .step-active { display: block; animation: fadeIn 0.5s; }
        .card { background: #161616; border: 1px solid #222; border-radius: 24px; }
        .input-style { background: #000; border: 1px solid #333; padding: 15px; border-radius: 15px; width: 100%; outline: none; margin-top: 8px; }
        .btn-next { background: #d4ff00; color: #000; font-weight: 900; padding: 18px; border-radius: 18px; width: 100%; margin-top: 20px; text-transform: uppercase; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4">
    <div id="setup-form" class="max-w-md mx-auto">
        <div id="step1" class="step step-active">
            <h2 class="text-3xl font-black italic accent mb-2">SALOM! 🔥</h2>
            <p class="text-gray-400 mb-8 uppercase text-xs tracking-widest font-bold">Profil yaratishni boshlaymiz</p>
            <div class="card p-6">
                <label class="text-[10px] text-gray-500 font-bold uppercase">Ismingiz</label>
                <input id="u-name" type="text" placeholder="Asadbek" class="input-style mb-4">
                <label class="text-[10px] text-gray-500 font-bold uppercase">Yoshingiz</label>
                <input id="u-age" type="number" placeholder="00" class="input-style">
                <button onclick="nextStep(2)" class="btn-next">Davom etish</button>
            </div>
        </div>

        <div id="step2" class="step">
            <h2 class="text-2xl font-black mb-6 italic uppercase">Parametrlar</h2>
            <div class="card p-6">
                <label class="text-[10px] text-gray-500 font-bold uppercase">Bo'yingiz (sm)</label>
                <input id="u-height" type="number" placeholder="180" class="input-style mb-4">
                <label class="text-[10px] text-gray-500 font-bold uppercase">Hozirgi vazningiz (kg)</label>
                <input id="u-weight" type="number" placeholder="85" class="input-style">
                <button onclick="nextStep(3)" class="btn-next">Davom etish</button>
            </div>
        </div>

        <div id="step3" class="step">
            <h2 class="text-2xl font-black mb-6 italic uppercase">Asosiy maqsad nima?</h2>
            <div class="grid grid-cols-1 gap-4">
                <div onclick="setGoal('lose')" id="g-lose" class="card p-6 border-2 border-transparent cursor-pointer">
                    <h3 class="font-black text-[#d4ff00]">OZISH (SUSHKA)</h3>
                    <p class="text-xs text-gray-500">Yog'ni yo'qotish va mushakni saqlash</p>
                </div>
                <div onclick="setGoal('gain')" id="g-gain" class="card p-6 border-2 border-transparent cursor-pointer">
                    <h3 class="font-black text-blue-400">SEMIRISH (MASSA)</h3>
                    <p class="text-xs text-gray-500">Mushak massasini oshirish</p>
                </div>
                <button onclick="nextStep(4)" class="btn-next">Davom etish</button>
            </div>
        </div>

        <div id="step4" class="step text-center">
            <div id="loader" class="py-10">
                <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-[#d4ff00] mx-auto mb-4"></div>
                <p class="text-sm font-bold animate-pulse">AI PLAN TUZILMOQDA...</p>
            </div>
            <div id="plan-result" class="hidden">
                <h2 class="text-2xl font-black accent italic mb-4">SIZNING PLANINGIZ TAYYOR!</h2>
                <div class="card p-6 mb-4 text-left">
                    <p class="text-gray-400 text-[10px] uppercase font-bold">Kunlik kaloriya normangiz:</p>
                    <div class="text-4xl font-black mb-4 italic" id="final-kcal">0 kcal</div>
                    <hr class="border-gray-800 mb-4">
                    <p class="text-sm text-gray-300" id="ai-advice"></p>
                </div>
                <button onclick="saveAndStart()" class="btn-next">Ilovani boshlash</button>
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let userData = { goal: 'lose' };

        function nextStep(s) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('step-active'));
            document.getElementById('step' + s).classList.add('step-active');
            if(s === 4) generatePlan();
            tg.HapticFeedback.impactOccurred('medium');
        }

        function setGoal(g) {
            userData.goal = g;
            document.getElementById('g-lose').style.borderColor = g === 'lose' ? '#d4ff00' : 'transparent';
            document.getElementById('g-gain').style.borderColor = g === 'gain' ? '#d4ff00' : 'transparent';
        }

        function generatePlan() {
            setTimeout(() => {
                const age = document.getElementById('u-age').value;
                const h = document.getElementById('u-height').value;
                const w = document.getElementById('u-weight').value;
                
                // Harris-Benedict formula (soddalashtirilgan)
                let bmr = 10 * w + 6.25 * h - 5 * age + 5;
                let finalKcal = userData.goal === 'lose' ? bmr * 1.2 - 300 : bmr * 1.2 + 400;

                document.getElementById('loader').classList.add('hidden');
                document.getElementById('plan-result').classList.remove('hidden');
                document.getElementById('final-kcal').innerText = Math.round(finalKcal) + " kcal";
                
                let advice = userData.goal === 'lose' ? 
                    "Sizga haftasiga 3 marta kardio va yuqori proteinli dieta tavsiya etiladi. Kuniga kamida 2.5 litr suv iching." :
                    "Sizga og'ir vaznli mashqlar va ko'p uglevodli ratsion tavsiya etiladi. Dam olishga e'tibor bering.";
                document.getElementById('ai-advice').innerText = advice;
            }, 2000);
        }

        function saveAndStart() {
            tg.showAlert("Tabriklaymiz! Reja saqlandi. Endi ovqatlaringizni kiritib borishingiz mumkin.");
            // Bu yerda biz boyagi kalkulyator sahifasiga o'tkazamiz
            location.reload(); 
        }
    </script>
</body>
</html>
