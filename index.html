<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MassBalance Pro V7.1</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: #111; border: 1px solid #222; border-radius: 20px; }
        .accent { color: #d4ff00; }
        .bg-accent { background: #d4ff00; color: #000; }
        .progress-bg { background: #1a1a1a; height: 8px; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; transition: 0.8s ease; }
        input, select { background: #1a1a1a; border: 1px solid #333; padding: 15px; border-radius: 15px; width: 100%; outline: none; color: #fff; font-size: 16px; }
        input:focus { border-color: #d4ff00; }
        .tab-btn { flex: 1; text-align: center; padding: 15px; font-size: 10px; font-weight: 900; color: #555; }
        .tab-active { color: #d4ff00; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 pb-28">

    <div id="onboarding" class="max-w-md mx-auto py-5">
        <h1 class="text-3xl font-black italic accent mb-6 uppercase text-center">Profil Sozlash</h1>
        
        <div class="glass p-6 space-y-6">
            <div id="step1" class="space-y-4">
                <div>
                    <label class="text-[10px] text-gray-500 font-bold uppercase mb-2 block tracking-widest">Ism va Yosh</label>
                    <input id="reg-name" type="text" placeholder="Ismingiz (masalan: Asadbek)">
                </div>
                <div>
                    <input id="reg-age" type="number" placeholder="Yoshingiz (masalan: 26)">
                </div>
                <button onclick="goToStep(2)" class="w-full bg-accent p-4 rounded-xl font-black italic uppercase tracking-widest mt-4">Keyingisi <i class="fa-solid fa-arrow-right ml-2"></i></button>
            </div>

            <div id="step2" class="hidden space-y-4">
                <div>
                    <label class="text-[10px] text-gray-500 font-bold uppercase mb-2 block tracking-widest">Jismoniy parametrlar</label>
                    <input id="reg-weight" type="number" placeholder="Vazn (kg)">
                </div>
                <div>
                    <input id="reg-height" type="number" placeholder="Bo'y (sm)">
                </div>
                <div class="flex gap-2">
                    <button onclick="goToStep(1)" class="w-1/3 bg-gray-800 p-4 rounded-xl font-bold uppercase italic"><i class="fa-solid fa-arrow-left"></i></button>
                    <button onclick="goToStep(3)" class="w-2/3 bg-accent p-4 rounded-xl font-black italic uppercase tracking-widest">Keyingisi</button>
                </div>
            </div>

            <div id="step3" class="hidden space-y-4">
                <div>
                    <label class="text-[10px] text-gray-500 font-bold uppercase mb-2 block tracking-widest">Haftada necha marta shug'ullanasiz?</label>
                    <select id="reg-activity">
                        <option value="1.2">Hali boshlamaganman (0 marta)</option>
                        <option value="1.375">Yengil faollik (1-2 marta)</option>
                        <option value="1.55">O'rtacha faollik (3-4 marta)</option>
                        <option value="1.725">Yuqori faollik (5-6 marta)</option>
                        <option value="1.9">Professional (Har kuni)</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] text-gray-500 font-bold uppercase mb-2 block tracking-widest">Maqsadingiz nima?</label>
                    <select id="reg-goal">
                        <option value="lose">Ozish (Sushka)</option>
                        <option value="gain">Semirish (Massa)</option>
                    </select>
                </div>
                <div class="flex gap-2">
                    <button onclick="goToStep(2)" class="w-1/3 bg-gray-800 p-4 rounded-xl font-bold uppercase italic"><i class="fa-solid fa-arrow-left"></i></button>
                    <button onclick="saveFinalProfile()" class="w-2/3 bg-accent p-4 rounded-xl font-black italic uppercase tracking-widest text-sm">Rejani tuzish <i class="fa-solid fa-check-double ml-1"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div id="main-app" class="max-w-md mx-auto hidden">
        <div id="tab-dash" class="space-y-4">
            <div class="flex justify-between items-center px-1">
                <div>
                    <h2 class="text-2xl font-black italic accent uppercase tracking-tighter" id="display-name">ATLET</h2>
                    <p class="text-[9px] text-gray-600 font-bold uppercase tracking-widest" id="display-goal">REJIM</p>
                </div>
                <button onclick="sendToBot()" class="bg-blue-600/20 text-blue-400 border border-blue-600/30 px-4 py-2 rounded-xl text-[10px] font-black tracking-widest">
                    HISOBOTNI YUBORISH
                </button>
            </div>

            <div class="glass p-6 space-y-6">
                <div class="text-center">
                    <p class="text-[10px] text-gray-500 uppercase font-bold mb-1 italic tracking-widest">Bugungi qolgan kaloriya</p>
                    <h1 class="text-6xl font-black italic accent" id="rem-kcal">0</h1>
                </div>
                
                <div class="grid grid-cols-3 gap-4">
                    <div class="space-y-2">
                        <p class="text-[8px] text-gray-500 font-bold uppercase">Oqsil (P)</p>
                        <div class="progress-bg"><div id="p-bar" class="progress-fill bg-blue-500" style="width: 0%"></div></div>
                        <p class="text-[10px] font-bold"><span id="curr-p">0</span> / <span id="max-p">0</span>g</p>
                    </div>
                    <div class="space-y-2">
                        <p class="text-[8px] text-gray-500 font-bold uppercase">Yog' (F)</p>
                        <div class="progress-bg"><div id="f-bar" class="progress-fill bg-yellow-500" style="width: 0%"></div></div>
                        <p class="text-[10px] font-bold"><span id="curr-f">0</span> / <span id="max-f">0</span>g</p>
                    </div>
                    <div class="space-y-2">
                        <p class="text-[8px] text-gray-500 font-bold uppercase">Ugle (C)</p>
                        <div class="progress-bg"><div id="c-bar" class="progress-fill bg-green-500" style="width: 0%"></div></div>
                        <p class="text-[10px] font-bold"><span id="curr-c">0</span> / <span id="max-c">0</span>g</p>
                    </div>
                </div>
            </div>

            <h3 class="text-xs font-black uppercase italic tracking-widest mt-6 px-1">Bugungi qaydlar:</h3>
            <div id="food-logs" class="space-y-3"></div>
        </div>

        <div id="tab-add" class="hidden space-y-4">
            <div class="glass p-6 space-y-4">
                <h3 class="text-lg font-black accent uppercase italic">Taom qo'shish</h3>
                <input id="f-name" type="text" placeholder="Nomi (osh, tuxum, go'sht...)">
                <input id="f-weight" type="number" placeholder="Miqdori (grammda)">
                <button onclick="addToLog()" class="w-full bg-accent p-5 rounded-2xl font-black italic uppercase tracking-widest text-lg shadow-lg shadow-yellow-500/10">Qo'shish +</button>
            </div>
        </div>

        <div id="tab-diet" class="hidden space-y-3">
            <h3 class="text-lg font-black accent uppercase italic px-1">Siz uchun tavsiya:</h3>
            <div id="diet-content" class="space-y-3"></div>
        </div>
    </div>
    <div id="bottom-nav" class="fixed bottom-0 left-0 right-0 glass rounded-none border-t border-white/5 flex py-3 px-2 hidden">
        <button onclick="showTab('dash')" id="n-dash" class="tab-btn tab-active"><i class="fa-solid fa-chart-line text-xl block mb-1"></i>HISOBOT</button>
        <button onclick="showTab('add')" id="n-add" class="tab-btn"><i class="fa-solid fa-circle-plus text-3xl block mb-1 accent"></i></button>
        <button onclick="showTab('diet')" id="n-diet" class="tab-btn"><i class="fa-solid fa-utensils text-xl block mb-1"></i>RATSION</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        let logs = JSON.parse(localStorage.getItem('mb_logs_final') || '[]');
        let user = JSON.parse(localStorage.getItem('mb_user_final') || 'null');

        const foodDb = {
            "osh": { k: 210, p: 6, f: 12, c: 20 },
            "tuxum": { k: 155, p: 13, f: 11, c: 1 },
            "tovuq": { k: 165, p: 31, f: 3, c: 0 },
            "somsa": { k: 280, p: 10, f: 15, c: 25 },
            "non": { k: 250, p: 8, f: 1, c: 45 },
            "go'sht": { k: 250, p: 26, f: 15, c: 0 },
            "guruch": { k: 130, p: 2.7, f: 0.3, c: 28 }
        };

        function goToStep(s) {
            // Hamma steplarni yopish
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.add('hidden');
            // Kerakli stepni ochish
            document.getElementById('step' + s).classList.remove('hidden');
            tg.HapticFeedback.impactOccurred('light');
        }

        function saveFinalProfile() {
            const n = document.getElementById('reg-name').value;
            const w = parseFloat(document.getElementById('reg-weight').value);
            const h = parseFloat(document.getElementById('reg-height').value);
            const a = parseFloat(document.getElementById('reg-age').value);
            const act = parseFloat(document.getElementById('reg-activity').value);
            const g = document.getElementById('reg-goal').value;

            if(!n  !w  !h || !a) {
                tg.showAlert("Iltimos, barcha maydonlarni to'ldiring!");
                return;
            }

            // BMR Hisoblash (Mifflin-St Jeor)
            let bmr = (10 * w) + (6.25 * h) - (5 * a) + 5;
            let norm = bmr * act;
            let targetKcal = g === 'lose' ? norm - 500 : norm + 500;

            user = {
                name: n, weight: w, goal: g,
                maxK: Math.round(targetKcal),
                maxP: Math.round(w * 1.8), // 1.8g protein per kg
                maxF: Math.round(w * 0.7), // 0.7g fat per kg
                maxC: Math.round((targetKcal - (w*1.8*4) - (w*0.7*9)) / 4)
            };

            localStorage.setItem('mb_user_final', JSON.stringify(user));
            startApp();
        }

        function startApp() {
            document.getElementById('onboarding').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('bottom-nav').classList.remove('hidden');
            
            document.getElementById('display-name').innerText = user.name;
            document.getElementById('display-goal').innerText = user.goal === 'lose' ? "SUSHKA REJIMI" : "MASSA REJIMI";
            
            document.getElementById('max-p').innerText = user.maxP;
            document.getElementById('max-f').innerText = user.maxF;
            document.getElementById('max-c').innerText = user.maxC;

            // Ratsion mazmuni
            let rHtml = user.goal === 'lose' ? 
                `<div class='glass p-4 border-l-4 border-accent'><p class='accent font-black mb-1'>NONUSHTA</p><p class='text-xs'>3ta tuxum (oqsil) + 50g suli bo'tqasi. Choy shakarsiz.</p></div>
                <div class='glass p-4 border-l-4 border-accent'><p class='accent font-black mb-1'>TUSHLIK</p><p class='text-xs'>150g qaynatilgan tovuq + Grechka + Salat.</p></div>` :
                `<div class='glass p-4 border-l-4 border-accent'><p class='accent font-black mb-1'>NONUSHTA</p><p class='text-xs'>3ta tuxum + 100g Non + Sariyog' + Asal.</p></div>
                 <div class='glass p-4 border-l-4 border-accent'><p class='accent font-black mb-1'>TUSHLIK</p><p class='text-xs'>1 portsiya Osh yoki Go'shtli quyuq ovqat + Salat.</p></div>`;
            document.getElementById('diet-content').innerHTML = rHtml;

            renderLogs();
        }

        function showTab(t) {
            ['dash', 'add', 'diet'].forEach(tab => {
                document.getElementById('tab-' + tab).classList.add('hidden');
                document.getElementById('n-' + tab).classList.remove('tab-active');
            });
            document.getElementById('tab-' + t).classList.remove('hidden');
            document.getElementById('n-' + t).classList.add('tab-active');
            tg.HapticFeedback.impactOccurred('light');
        }

        function addToLog() {
            const name = document.getElementById('f-name').value.toLowerCase();
            const weight = parseFloat(document.getElementById('f-weight').value);
            if(!name || !weight) return;

            let found = false;
            for(let key in foodDb) {
                if(name.includes(key)) {
                    let r = weight / 100;
                    logs.push({
                        id: Date.now(), name: name, weight: weight,
                        k: Math.round(foodDb[key].k * r),
                        p: Math.round(foodDb[key].p * r),
                        f: Math.round(foodDb[key].f * r),
                        c: Math.round(foodDb[key].c * r)
                    });
                    found = true; break;
                }
            }

            if(!found) {
                // Agar bazada bo'lmasa o'rtacha qiymat
                logs.push({ id: Date.now(), name: name, weight: weight, k: weight*1.5, p: 10, f: 5, c: 20 });
            }

            localStorage.setItem('mb_logs_final', JSON.stringify(logs));
            renderLogs();
            document.getElementById('f-name').value = "";
            document.getElementById('f-weight').value = "";
            showTab('dash');
        }

        function renderLogs() {
            let total = { k: 0, p: 0, f: 0, c: 0 };
            let html = logs.map(item => {
                total.k += item.k; total.p += item.p; total.f += item.f; total.c += item.c;
                return `<div class="glass p-4 flex justify-between items-center border-l-2 border-accent/20">
                    <div><p class="text-xs font-bold uppercase tracking-tight">${item.name}</p><p class="text-[8px] text-gray-600">${item.weight}g</p></div>
                    <div class="text-right"><p class="accent font-black text-sm">${item.k} kcal</p><button onclick="delItem(${item.id})" class="text-[8px] text-red-500 font-bold">O'CHIRISH</button></div>
                </div>`;
            }).join('');
            
            document.getElementById('food-logs').innerHTML = html || "<p class='text-center text-gray-700 py-10 text-xs italic'>Hali hech narsa yeyilmadi...</p>";
            document.getElementById('rem-kcal').innerText = user.maxK - total.k;
            document.getElementById('curr-p').innerText = total.p;
            document.getElementById('curr-f').innerText = total.f;
            document.getElementById('curr-c').innerText = total.c;

            document.getElementById('p-bar').style.width = Math.min((total.p / user.maxP)*100, 100) + "%";
            document.getElementById('f-bar').style.width = Math.min((total.f / user.maxF)*100, 100) + "%";
            document.getElementById('c-bar').style.width = Math.min((total.c / user.maxC)*100, 100) + "%";
        }

        function delItem(id) {
            logs = logs.filter(i => i.id !== id);
            localStorage.setItem('mb_logs_final', JSON.
                                 stringify(logs));
            renderLogs();
        }

        function sendToBot() {
            let res = 📊 HISOBOT: ${user.name}\nMaqsad: ${user.goal}\nJami kkal: ${document.getElementById('rem-kcal').innerText} qoldi.\nBJU: P:${document.getElementById('curr-p').innerText}g, F:${document.getElementById('curr-f').innerText}g, C:${document.getElementById('curr-c').innerText}g;
            tg.sendData(res);
        }

        window.onload = () => { if(user) startApp(); };
    </script>
</body>
</html>
